<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="一个专注、优雅的英语单词学习系统：分类浏览、间隔复习、测验/听写/拼写练习与学习分析。">
    <meta name="color-scheme" content="light dark">
    <title>英语单词学习系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script>
        // Apply saved theme before paint to avoid a flash of the wrong theme.
        (function () {
            try {
                var saved = JSON.parse(localStorage.getItem('theme'));
                var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {}
        })();
    </script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-top">
                <div class="header-brand">
                    <div class="logo-row">
                        <div class="logo"><span class="logo-mark">EN</span>英语单词学习</div>
                        <span class="logo-badge">Focus</span>
                    </div>
                    <div class="logo-subtitle">每日专注记忆 · 间隔复习 · 持续精进</div>
                </div>
                <nav class="main-nav">
                    <button class="nav-item active" onclick="switchPage('learn')" data-page="learn">📖 学习</button>
                    <button class="nav-item" onclick="switchPage('stats')" data-page="stats">📊 统计</button>
                    <button class="nav-item" onclick="switchPage('settings')" data-page="settings">⚙️ 设置</button>
                    <span class="nav-spacer"></span>
                    <button class="theme-toggle" onclick="showAchievementsModal()" title="成就 (Ctrl+A)" aria-label="查看成就">🏆</button>
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题" aria-label="切换主题">🌙</button>
                </nav>
                <div class="stats-grid">
                    <div class="stat-card total">
                        <div class="stat-number" id="totalWords">0</div>
                        <div class="stat-label">总单词</div>
                    </div>
                    <div class="stat-card mastered">
                        <div class="stat-number" id="masteredWords">0</div>
                        <div class="stat-label">已掌握</div>
                    </div>
                    <div class="stat-card difficult">
                        <div class="stat-number" id="difficultWords">0</div>
                        <div class="stat-label">难记</div>
                    </div>
                    <div class="stat-card learning">
                        <div class="stat-number" id="learningWords">0</div>
                        <div class="stat-label">学习中</div>
                    </div>
                </div>
            </header>

        <section class="progress-section">
            <div class="progress-main">
                <div class="progress-header">
                    <div class="progress-title">学习进度</div>
                    <div class="progress-percentage" id="progressPercentage">0%</div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="progress-segments" id="progressSegments"></div>
                </div>
                <div class="review-meta">
                    <span>🧠 今日待复习</span>
                    <span id="reviewCount" class="review-count">0</span>
                    <span>个单词</span>
                </div>
            </div>
            <div class="goal-ring" id="goalRing">
                <svg viewBox="0 0 60 60" aria-hidden="true">
                    <circle class="ring-track" cx="30" cy="30" r="24" fill="none" stroke-width="6"></circle>
                    <circle class="ring-fill" id="goalRingFill" cx="30" cy="30" r="24" fill="none" stroke-width="6"></circle>
                </svg>
                <div class="goal-meta">
                    <span class="goal-value"><span id="goalCurrent">0</span>/<span id="goalTarget">20</span></span>
                    <span class="goal-label">今日目标</span>
                </div>
            </div>
        </section>

        <nav class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item active">首页</span>
        </nav>

        <div class="controls">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索单词…" title="快捷键: Ctrl+K" autocomplete="off">
            <select class="filter-select" id="presetFilter" onchange="applyPresetFilter(this.value)">
                <option value="all">🎯 预设筛选</option>
                <option value="business-nouns">💼 商业名词</option>
                <option value="daily-verbs">🏠 日常动词</option>
                <option value="science-adjectives">🔬 科学形容词</option>
                <option value="learning-words">📚 学习中</option>
                <option value="difficult-words">⚠️ 难记单词</option>
                <option value="unlearned-words">📝 未学习</option>
            </select>
            <select class="filter-select" id="categoryFilter">
                <option value="all">📁 全部分类</option>
            </select>
            <select class="filter-select" id="partOfSpeechFilter">
                <option value="all">📝 全部词性</option>
            </select>
            <select class="filter-select" id="statusFilter">
                <option value="all">📊 全部状态</option>
                <option value="gray">⚪ 未学习</option>
                <option value="green">🟢 已掌握</option>
                <option value="red">🔴 难记</option>
            </select>
            <button class="action-btn btn-secondary" onclick="toggleAdvancedFilters()" title="高级筛选">⚙️ 高级</button>
            <button class="action-btn btn-secondary" onclick="resetFilters()" title="重置筛选">🔄 重置</button>
        </div>

        <div class="advanced-filters hidden" id="advancedFilters">
            <div class="advanced-filters-content">
                <div class="filter-group">
                    <label>父分类</label>
                    <select class="filter-select" id="parentCategoryFilter">
                        <option value="all">📂 父分类</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>子分类</label>
                    <select class="filter-select" id="childCategoryFilter">
                        <option value="all">📁 子分类</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>主题</label>
                    <select class="filter-select" id="themeFilter">
                        <option value="all">🎨 全部主题</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="action-groups">
            <div class="action-group">
                <div class="action-group-title">学习</div>
                <button class="action-btn btn-primary" onclick="startQuiz()" title="快捷键: Ctrl+Q">🎯 测验</button>
                <button class="action-btn btn-success" onclick="startPractice()" title="快捷键: Ctrl+P">✏️ 造句练习</button>
            </div>
            <div class="action-group">
                <div class="action-group-title">复习</div>
                <button class="action-btn btn-violet" onclick="startSmartReview()" title="快捷键: Ctrl+R">🧠 智能复习</button>
                <button class="action-btn btn-pink" onclick="startListening()" title="快捷键: Ctrl+L">🎧 听力</button>
                <button class="action-btn btn-pink" onclick="startSpelling()" title="快捷键: Ctrl+S">🔤 拼写</button>
            </div>
        </div>

        <div class="batch-bar">
            <span class="batch-bar-title">批量操作</span>
            <button class="action-btn btn-warning" onclick="toggleBatchMode()" id="batchModeBtn">☑ 批量选择</button>
            <button class="action-btn btn-success" onclick="batchSetStatus('green')" id="batchMarkMastered" disabled>🟢 批量掌握</button>
            <button class="action-btn btn-danger" onclick="batchSetStatus('red')" id="batchMarkDifficult" disabled>🔴 批量难记</button>
            <button class="action-btn btn-secondary" onclick="batchSetStatus('gray')" id="batchMarkUnlearned" disabled>⚪ 批量未学</button>
            <span class="batch-count" id="batchCount"></span>
        </div>

        <div class="category-tabs" id="categoryTabs"></div>

        <div class="word-grid" id="wordGrid"></div>
    </div>

    <div class="modal" id="quizModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">🎯 词汇测验</h2>
                <button class="close-btn" onclick="closeQuizModal()" aria-label="关闭">&times;</button>
            </div>
            <div id="quizContent"></div>
        </div>
    </div>

    <div class="modal" id="practiceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">✏️ 造句练习</h2>
                <button class="close-btn" onclick="closePracticeModal()" aria-label="关闭">&times;</button>
            </div>
            <div id="practiceContent"></div>
        </div>
    </div>

    <div class="modal" id="listeningModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">🎧 听力练习</h2>
                <button class="close-btn" onclick="closeListeningModal()" aria-label="关闭">&times;</button>
            </div>
            <div id="listeningContent"></div>
        </div>
    </div>

    <div class="modal" id="spellingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">🔤 拼写练习</h2>
                <button class="close-btn" onclick="closeSpellingModal()" aria-label="关闭">&times;</button>
            </div>
            <div id="spellingContent"></div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">⚙️ 设置</h2>
                <button class="close-btn" onclick="closeSettingsModal()" aria-label="关闭">&times;</button>
            </div>
            <div id="settingsContent"></div>
        </div>
    </div>

    <div class="modal" id="analyticsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">📊 学习分析</h2>
                <button class="close-btn" onclick="closeAnalyticsModal()" aria-label="关闭">&times;</button>
            </div>
            <div class="analytics-tabs">
                <div class="analytics-tab active" onclick="switchAnalyticsTab('heatmap', this)">📅 学习热力图</div>
                <div class="analytics-tab" onclick="switchAnalyticsTab('trend', this)">📈 掌握趋势</div>
                <div class="analytics-tab" onclick="switchAnalyticsTab('dot', this)">🔵 全局点图</div>
            </div>
            <div id="analyticsContent"></div>
        </div>
    </div>

    <div class="modal" id="achievementsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">🏆 成就系统</h2>
                <button class="close-btn" onclick="closeAchievementsModal()" aria-label="关闭">&times;</button>
            </div>
            <div id="achievementsContent" class="achievements-content"></div>
        </div>
    </div>

    <script src="js/filter-render.js"></script>
    <script src="js/learning-utils.js"></script>
    <script src="js/session-renderers.js"></script>
    <script src="js/ui-feedback.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
